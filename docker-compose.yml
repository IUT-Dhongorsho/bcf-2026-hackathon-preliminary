version: '3.8'

services:
  postgres:
    image: postgres:15.1-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bcf_db
      POSTGRES_USER: bcf
      POSTGRES_PASSWORD: bcf2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/generated_data.sql:/docker-entrypoint-initdb.d/generated_data.sql:ro
  pgweb:
    image: sosedoff/pgweb:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://bcf:bcf2026@postgres:5432/bcf_db?sslmode=disable
    depends_on:
      - postgres

volumes:
  postgres_data: